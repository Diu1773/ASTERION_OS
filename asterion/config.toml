# Asterion — 청람천문대 통합 관측 OS 설정
# 시뮬레이션이 기본값. 실제 하드웨어 연결 전에는 항상 sim으로 검증한다.

[site]
name = "청람천문대"
name_ascii = "Cheongram Observatory"   # FITS 헤더용 (ASCII만 허용)
latitude = 36.64        # TODO: 실제 좌표로 수정 (deg, 북위 +)
longitude = 127.49      # TODO: 실제 좌표로 수정 (deg, 동경 +)
elevation_m = 200
focal_length_mm = 2939  # PlaneWave (TODO: 실제 값 확인)
instrument = "ZWO ASI071MC Pro"

# 사이트 프로파일 — 스케줄러 merit/하드제약에 반영(없으면 무영향).
[site_profile]
bortle = 4                 # 광공해 등급(1 어두움~9 도심). >4면 광대역에서 어두운 대상 merit↓
dome_type = "manual"       # manual/electric/roll-off (참고용)
# 지평선 마스크 — 방위(0=북,90=동,180=남,270=서)별 한계고도(도). 건물/산 너머는 관측 불가.
# [[방위, 최소고도], …] 비우면 평지(0°). 예) 동쪽 30° 능선:
# horizon_mask = [[0, 5], [80, 5], [100, 30], [120, 30], [140, 5], [359, 5]]
horizon_mask = []

[server]
host = "127.0.0.1"
port = 8520
# 리버스 프록시/Tailscale serve 뒤 운영 시(REMOTE_ACCESS_PLAN Phase B):
forwarded_allow_ips = "127.0.0.1"   # X-Forwarded-* 신뢰 업스트림 IP. serve는 localhost에서 프록시.
# allowed_hosts = ["asterion.<tailnet>.ts.net", "127.0.0.1", "localhost"]  # Host 헤더 핀(설정 시 활성)

[server.auth]
# 원격 접속 인증/인가 게이트 (REMOTE_ACCESS_PLAN Phase A). 기본 꺼짐 → 로컬 SIM 개발 무변경.
# 켜면 모든 /api·/ws가 로그인(세션 쿠키) 또는 토큰을 요구한다. 역할: viewer < operator < admin
#   viewer = 읽기(상태/텔레메트리/프레임)
#   operator = + 장비 명령(/api/actions/*: 가대·카메라·돔·포커서·관측)
#   admin = + 시스템 연결/드라이버 모드/안전 오버라이드(/api/system·/api/dev)
#   token = 기계 전용(원격 기상 PC → /api/weather/ingest, scope=ingest)
# ⚠ 실제 사용자·토큰·시크릿은 git에 안 올라가는 config.local.json 에만 넣는다(여기엔 형식만).
#   비번/토큰/시크릿 생성:  python -m asterion.access   (사용법 출력)
enabled = false
cookie_secure = false        # HTTPS(예: tailscale serve) 뒤에서 운영하면 true 권장
# session_ttl_hours = 12     # 로그인 유지 시간
# Tailscale serve 뒤라면 비번 없이 tailnet 신원으로 로그인(serve가 Tailscale-User-Login 주입).
# ⚠ serve/신뢰 프록시 뒤에서만 true — 직접 노출 시 클라이언트가 헤더를 위조할 수 있다.
# trust_tailscale_identity = false
#   config.local.json: "server":{"auth":{"tailscale_users":{"alice@github":"admin","bob@gmail.com":"operator"}}}
#
#   config.local.json 예시:
#   {
#     "server": { "auth": {
#       "enabled": true,
#       "session_secret": "<python -m asterion.access secret 로 생성>",
#       "users": {
#         "alice": { "role": "admin",    "password": "pbkdf2_sha256$..." },
#         "bob":   { "role": "operator", "password": "pbkdf2_sha256$..." }
#       },
#       "tokens": {
#         "weatherpc01": { "scopes": ["ingest"], "hash": "<토큰의 sha256>" }
#       }
#     }}
#   }

[server.ratelimit]
# 레이트리밋(REMOTE_ACCESS_PLAN Phase D) — 지정 경로만 슬라이딩 윈도로 제한(나머지 무제한).
# /login = 브루트포스 방어, /api/agent/chat = LLM 비용 방어. 초과 시 429. 인증 무관 항상 동작.
enabled = true
login_max = 10                 # 윈도당 최대 로그인 시도(IP별)
login_window_s = 60
agent_max = 30                 # 윈도당 최대 AI 챗 요청(IP별)
agent_window_s = 60

[drivers]
# mode = "sim"  → 모든 장비 시뮬레이터 (마스터 스위치)
# mode = "real" → 아래 장비별 설정을 따름 (장비별로 sim 혼용 가능: 예. mount만 pwi4, 카메라는 sim)
mode = "sim"
mount = "pwi4"          # real 모드에서: "pwi4" | "sim"
camera = "zwo"          # real 모드에서: "zwo" | "ascom" | "sim"
filterwheel = "ascom"   # real 모드에서: "ascom" | "sim"
focuser = "ascom"       # real 모드에서: "ascom" | "sim"
weather = "sim"         # 기상 장비 연결 전까지 sim

# 자동 재연결 워치독 — 끊긴 장비를 백오프로 다시 붙인다 (운영자가 끈 건 제외)
auto_reconnect = true
watchdog_interval_s = 5      # 워치독 점검 주기
sampler_stall_seconds = 15   # 상태 스냅샷이 이 시간 이상 갱신 없으면 샘플러 루프 정지로 보고 경보(rank8)
reconnect_grace_s = 30       # 연결 직후 유예 — 호밍/캘리브레이션(ZWO EFW 등) 끝낼 시간. 그 안엔 재연결 안 함
reconnect_base_s = 5         # 첫 재시도 간격 (이후 2배씩 증가)
reconnect_max_s = 60         # 재시도 간격 상한
filterwheel_init_timeout_s = 20  # EFW 초기화가 이 시간을 넘으면 연결 해제
filterwheel_move_timeout_s = 20  # EFW 슬롯 이동 제한시간

[drivers.pwi4]
base_url = "http://127.0.0.1:8220"

[drivers.zwo]
# ZWO ASI071 MC Pro 네이티브 SDK 연결 (ASCOM/DCOM 불필요)
# lib_path = ""  → 자동 탐색 (ZWO SDK / SharpCap / NINA / 레지스트리 순)
# 자동 탐색이 실패할 때만 아래 주석 해제 후 경로 직접 입력:
# lib_path = "C:/Program Files/ZWO/ASI Camera SDK/x64/ASICamera2.dll"
lib_path = ""
camera_index = 0    # PC에 ZWO 카메라가 1대면 0
gain = 0            # 0 = 최저 게인 (이미징 기본값; 높일수록 노이즈 증가)

[drivers.davis]
# Davis WeatherLink Live 로컬 API (LAN). real 모드 + drivers.weather="davis"일 때 사용
base_url = "http://127.0.0.1"

[drivers.davis_serial]
# Davis Vantage 콘솔 USB/RS-232 직결(WeatherLink 게이트웨이 없이). real 모드 +
# drivers.weather="davis_serial"일 때 사용. LOOP 패킷을 직접 받아 신선도(reading_age_s)도
# 직접 산출 → frozen 센서 fail-closed.
port = "auto"         # "auto"=LOOP 응답 포트 자동감지(권장; COM 번호 불안정 대응). 직접 지정도
                      #   가능: "COM8"(Windows) / "/dev/ttyUSB0"(Linux). 시리얼 돔 포트는 자동 제외.
baud = 19200          # Davis 콘솔 기본 19200

[drivers.ascom]
# scripts/choose_ascom.py 실행 → ASCOM Chooser에서 선택 → 출력된 ProgID를 여기에 입력
mount_progid = ""         # ASCOM Telescope (PWI4 대신 ASCOM 가대일 때. 예: RST-135)
camera_progid = ""        # 예: "ASCOM.C3_61000.Camera" (ZWO 등)
filterwheel_progid = ""
focuser_progid = ""
weather_progid = ""       # ASCOM ObservingConditions (Davis/AAG/Boltwood 등)
dome_progid = ""          # ASCOM Dome (NexDome/MaxDome II/ScopeDome 등)

[drivers.dome]
# 시리얼 돔(청람 CW/CCW/STOP). real 모드 + drivers.dome="serial"일 때 사용.
# ⚠️ 명령 프로토콜·회전속도는 실제 컨트롤러로 검증·교정할 것(현재 기본값은 자리표시).
serial_port = ""           # 예: "COM3" (비우면 미연결)
baud = 9600
rot_speed_deg_s = 3.0      # 추측항법용 회전속도 — 한 바퀴 시간 재서 교정

[dome]
# 돔 슬레이빙 기하 (망원경 광축이 돔 구를 뚫는 방위 계산). 청람 1회 실측값.
# 오프셋은 돔 중심 대비 가대 교차점의 동/북/상 변위(m). 0이면 가대가 돔 중심.
radius_m = 2.0
mount_offset_e_m = 0.0
mount_offset_n_m = 0.0
mount_offset_up_m = 0.0
gem_dec_offset_m = 0.0     # 독일식 적도의 경통 측면 오프셋(근사)
az_tolerance_deg = 4.0     # 슬릿이 넓어 이 오차 안이면 재이동 안 함

[capture]
# 수동 캡처 콘솔 기본값
default_exposure = 2.0
default_interval = 1.0
autosave = true

[filters]
# 필터휠 슬롯 순서대로
names = ["L", "B", "V", "R", "I", "Ha"]

[autoflat]
filters = ["B", "V", "R", "I"]   # 촬영할 필터 순서 (대역 순서)
frames_per_filter = 7
adu_min = 20000                  # 16bit 기준 목표 ADU 범위
adu_max = 25000
min_alt_deg = 40                 # 이 고도 미만이면 플랫 위치로 슬루
flat_alt_deg = 75                # 플랫 촬영 목표 고도 (반태양 방위)
dither_arcsec = 30               # 프레임 간 디더 크기
settle_seconds = 4               # 슬루 종료 후 가대 안정화 대기
initial_exposure = 1.0
min_exposure = 0.1
max_exposure = 60.0
# 스카이플랫 박명 창 — 일몰/일출 전후에만 촬영. 청람천문대는 박명 하늘에서 ~2초 노출.
flat_sun_alt_high = -1.0         # 태양이 이보다 높으면 너무 밝음 (시작 전)
flat_sun_alt_low = -12.0         # 태양이 이보다 낮으면 너무 어두움 (종료)

[focus_model]
# 온도·고도 기반 포커스 자동 보정(PWI3식 temperature/altitude compensation).
# 과거 오토포커스(FocusRun: 위치+환경)로 position = c0 + c_temp·T (+ c_alt·alt)를 적합하고,
# 촬영 중 환경 변화에 맞춰 포커서를 예측 위치로 미세 이동 → 매 프레임 풀 오토포커스 없이 FWHM 유지.
enabled = false                  # 기본 비활성 — 켜면 _do_filter가 필터 진입 시·주기적으로 보정
mode = "auto"                    # "auto"(이력 최소제곱) | "manual"(아래 계수 직접 입력)
temp_source = "focuser"          # 모델 온도 소스: "focuser"(OTA 근접) | "ambient"(외기) | "primary"(주경, 센서 있을 때)
use_altitude = true              # 고도 항(미러 플렉서) 포함 — 데이터에 고도 변화(≥5°)가 있을 때만 실제 적합
min_points = 4                   # auto 적합 최소 데이터점(FocusRun 수)
min_temp_span_c = 2.0            # 온도 변화폭이 이 미만이면 적합 거부(온도 계수 신뢰 불가, fail-safe)
deadband_steps = 10              # 예측-현재 차가 이 미만이면 이동 생략(불필요한 미동 방지)
max_step_steps = 0               # 1회 보정 최대 이동(steps), 0=무제한. 센서/모델 이상 시 폭주 방지용
recompute_every_frames = 5       # 시퀀스 중 N프레임마다 재보정(0=필터 진입 시 1회만)
# mode="manual" 또는 auto 적합 실패 시 폴백 — 알려진 온도계수(steps/°C)를 직접 입력. 최근
# 오토포커스 위치를 앵커로 c0를 유도한다(그 지점을 지나는 직선). 모르면 비워둔다.
# c_temp_steps_per_c = -15.0
# c_alt_steps_per_deg = 0.0

[camera]
saturation_adu = 65535
image_width = 4944               # ZWO ASI071 MC Pro (IMX071, APS-C)
image_height = 3284

[sim]
image_width = 618                # 시뮬 프레임은 축소 생성 (속도, ASI071 1/8 스케일)
image_height = 411
exposure_sleep_cap_s = 2.0       # 시뮬에서 노출 대기 상한 (데모 속도)
twilight_efold_s = 240.0         # 황혼 시뮬: 하늘 밝기 e-folding 시간
# 시뮬 돔 흉내: feedback=false면 추측항법(드리프트+추정), shutter_auto=false면 수동 셔터(청람 현 상태)
dome_feedback = true
dome_shutter_auto = true

[safety]
# 기상 텔레메트리 fail-closed (로드맵 §6.5 / 원칙 #5: "데이터 없으면 unsafe").
# 마지막으로 유효한 기상값을 받은 뒤 경과시간이 이 값을 넘으면 워치타워가
# 기상값을 신뢰하지 않는다. 데이터를 한 번도 못 받아도 unsafe로 닫는다.
weather_warn_seconds = 30      # 이 이상 지연 → 경고 표시 (운영 계속)
weather_unsafe_seconds = 120   # 이 이상 지연(또는 데이터 없음) → WEATHER_HOLD
# 분산 다중소스(§7): 최근 보고하던 소스가 침묵(dropout)하면 그 소스가 위험을 보던 것일 수
# 있어 위험이 마스킹된다 → 기본 fail-closed(HOLD). window 내에 보고한 적 있는 소스만 대상
# (오래 침묵=폐기로 무시, 영구 HOLD 방지). holds=false면 가시성(stale_sources)만, HOLD 안 함.
weather_dropout_window_seconds = 600   # 이 안에 보고한 적 있는 소스가 stale면 dropout으로 간주
weather_dropout_holds = true           # dropout 시 WEATHER_HOLD (false=경보/가시성만)

# 태양 회피(solar exclusion) — OTA가 태양/근방을 향하는 슬루를 막는다(센서/광학 일소 손상 방지).
# 모든 슬루 경로(수동 goto/jog/move_axis, AI, Orchestrator, 오토플랫)에 적용. 야간엔 태양이
# 지평 아래라 정상 대상은 이격이 커서 영향 없음.
sun_avoidance_deg = 15         # 태양 중심에서 이 각(°) 이내로는 슬루 거부 (최소 10° 권장)
# 태양 근접 슬루 override — ⚠ 센서/광학 손상 위험. *운영 책임자만* config.local.json에서 true로.
# true면 태양 회피 가드가 해제된다(태양 관측 등 의도적 작업용). AI 에이전트는 이 값과 무관하게
# 항상 차단되도록 설계됐다(AI는 우회 불가). ActionLog에 우회 사실이 감사 기록된다.
allow_solar_slew = false

# 원격 운영자 데드맨(REMOTE_ACCESS_PLAN Phase C) — 원격 수동 운영 중 운영자 UI 하트비트가
# 끊기면(브라우저 종료·네트워크 단절·세션 만료) 세이프-스테이트(추적정지·돔닫힘·파킹).
# 무인 운영(NightRunner)은 면제, 하트비트를 한 번도 못 받았으면 무장 안 함(로컬/헤드리스 보존).
# 원격 운영을 켤 때 같이 켜라(기본 off). ⚠ 하위 테이블이라 반드시 [safety]의 평면 키들 *뒤*에 둔다.
[safety.session_deadman]
enabled = false
timeout_seconds = 120          # 하트비트가 이 시간 끊기면 발화(짧은 네트워크 블립 오탐 방지)

[sentinel]
# 프레임 품질 판정 임계 (로드맵 §10.4). 기본 지표(중앙값 ADU·과포화 비율)로
# accepted/warning/rejected를 정한다. FWHM·star count는 추후 분석 플러그인이 채움.
saturation_reject_frac = 0.02   # 과포화 픽셀 비율 이 이상 → rejected
saturation_warn_frac = 0.005    # 이 이상 → warning
median_low_adu = 1000.0         # 중앙값 이 이하 → 노출 부족 warning
median_high_frac = 0.9          # 중앙값 ≥ 이 비율×saturation_adu → 과노출 warning

[forge]
# 실시간 단일 프레임 보정(퀵룩, 로드맵 §10.2 경량). 캡처된 LIGHT에 Calibration
# Library의 마스터 bias/dark/flat을 즉시 적용해 보정된 그림을 바로 프리뷰한다.
# 순수 numpy라 가볍다. 무거운 정렬·적분 스택은 AstralImage 서브프로세스로 별도(온디맨드).
# 토글은 런타임 API(/api/forge/toggle)로도 가능 — 아래는 시작 기본값.
live_calibration = false        # true면 찍자마자 보정된 퀵룩 (마스터 있을 때만 동작)
save_calibrated = false         # true면 보정본 FITS도 frames/cal/에 저장 (프리뷰만이면 false)
pedestal_adu = 0.0              # 보정 후 더할 페데스탈(음수/클리핑 방지용, 선택)
# 마스터 자동 해석 — 자율형: OS가 자기 캡처(Frame)를 우선 쓴다. 아래 핀은 폴백:
#   외부에서 찍은 마스터 '파일' 또는 보정프레임 '폴더' 경로(폴더면 안의 FITS를 스택).
#   비워두면 OS 캡처만 사용. flat은 오토플랫 당일분이 있으면 핀보다 그걸 우선.
dark_pin = ""                   # 예: "D:/cal/master_dark.fits" 또는 "D:/cal/darks/"
flat_pin = ""                   # 한 번 만든 마스터 플랫을 계속 쓸 때 지정
bias_pin = ""
dark_exposure_tol_s = 1.0       # 캡처 dark를 LIGHT 노출에 맞출 허용 오차(초, 1초 내외)
flat_max_age_hours = 24.0       # 이 시간 내 캡처 flat만 '당일'로 자동 사용 (넘으면 핀)
stack_max_frames = 20           # 마스터 합성 시 스택할 최대 프레임 수

# 단기 기상예보 — 스케줄러 게이팅·대시보드용. 키 있으면 실예보(KMA 동네예보),
# 비우면 Sim(합성 일주 곡선)으로 폴백해 게이팅 로직/대시보드는 그대로 동작한다.
[weather.kma_forecast]
service_key = ""                # 공공데이터포털 단기예보 인증키(없으면 sim 폴백)
nx = 67                         # 기상청 격자 X (TODO: 청람 좌표 격자 변환)
ny = 100                        # 기상청 격자 Y

# 강수 예보 조기경보 — 사람을 미리 깨워 (자동으로 못 닫는 수동)셔터 닫기·마무리 시간을 번다.
# 예보는 '경고'만 한다 — 돔을 닫거나 물리행동을 하지 않는다(예보는 확률이라 틀리면 밤 손실).
# 실제 닫기는 센서 감지(safety EMERGENCY_CLOSE)가 한다. additive·읽기만·alert뿐.
[weather.forecast_alert]
enabled = true
precip_threshold = 0.5          # 향후 lead_hours 내 강수확률 최대치가 이 값 이상이면 경보(0..1)
lead_hours = 2.0                # 앞으로 보는 예보 창(시간)
cooldown_seconds = 1800         # 같은 경보 재발화 억제(30분, 스팸 방지)
# 예보→긴 노출 시작 보류 (되돌릴 수 있는 선제 결정, 물리행동 아님 — 실제 닫기는 센서가 함).
# 노출이 도는 동안 강수확률이 precip_threshold 이상이면 새 긴 노출을 시작하지 않고 시퀀스를
# 마무리한다(진행 중 노출은 끝까지). 짧은 노출은 위험 낮아 그냥 진행.
defer_exposures = true
defer_min_exposure_s = 60       # 이 길이 이상 노출만 보류 대상(초)

[satellite]
# 위성영상 프록시 — KMA 천리안2A(GK-2A) 최신 프레임을 서버가 받아 캐시하고
# /api/satellite/latest.png 고정 URL로 서빙한다. 대시보드 위성영상 패널은 이 로컬
# URL을 '이미지' 유형으로 붙이면 된다(핫링크/CORS/타임스탬프 문제를 서버가 흡수).
enabled = true
base_url = "https://nmsc.kma.go.kr"
# 경로 템플릿(UTC): {YYYYMM}{DD}{HH} 경로 + {YYYYMMDDhhmm} 파일명.
# 기본 = IR 10.5µm 한반도(KO) — 적외라 주야 24h 구름이 보임, 2분 주기.
path_template = "/IMG/GK2A/AMI/PRIMARY/L1B/COMPLETE/KO/{YYYYMM}/{DD}/{HH}/gk2a_ami_le1b_ir105_ko020lc_{YYYYMMDDhhmm}.png"
# 대안(주석 해제해 교체) — 모두 실측 확인됨, 2분 주기:
#  · 트루컬러 한반도(주간 전용, 컬러):
#    path_template = "/IMG/GK2A/AMI/PRIMARY/L1B/COMPLETE/KO/{YYYYMM}/{DD}/{HH}/gk2a_ami_le1b_rgb-s-true_ko020lc_{YYYYMMDDhhmm}.png"
media_type = "image/png"
grid_seconds = 120         # 후보 시각 격자 = 제품 주기(KO 2분). 약수여야 함.
latency_seconds = 180      # 최신(미발행 가능) 프레임 건너뛰는 여유
lookback_steps = 30        # 역탐색 최대 스텝 (grid×steps = 1시간 과거까지)
refresh_seconds = 120      # 서버 캐시 갱신 주기('받는 주기') — 원본 주기에 맞춤
timeout_seconds = 12.0     # 프레임 1장 요청 타임아웃
min_bytes = 4096           # 이보다 작으면 이미지로 안 봄(HTML 에러페이지 거름)

[agent]
# 대시보드 임베디드 AI 채팅. LLM은 벤더중립(OpenAI 호환) — 공급자를 여러 개 등록해두고
# active 하나를 쓰며, 채팅 헤더에서 공급자·모델을 런타임에 바꾼다. 키는 공급자별로 분리돼
# 헷갈리지 않는다. 실제 키는 git에 안 올라가는 config.local.json 에 넣어라(아래는 형식 안내).
# 아무 공급자도 설정 안 되면 채팅창은 뜨되 "공급자 미설정" 안내만 돌려준다(코어 영향 0).
#
#   [agent]
#   active = "groq"                 # 지금 쓸 공급자 이름(providers 키 중 하나)
#
#   [agent.providers.groq]          # 무료·빠름(키 필요, console.groq.com)
#   base_url = "https://api.groq.com/openai/v1"
#   api_key  = "gsk_..."
#   model    = "llama-3.3-70b-versatile"
#
#   [agent.providers.openai]
#   base_url = "https://api.openai.com/v1"
#   api_key  = "sk-..."
#   model    = "gpt-4o-mini"
#
#   [agent.providers.ollama]        # 로컬·무료·키 불필요(GPU 필요)
#   base_url = "http://127.0.0.1:11434/v1"
#   model    = "llama3.1"
#
# 레거시 평면 구조(base_url/model/api_key 직접)도 계속 지원 — 자동으로 단일 공급자로 감싼다.
# system_prompt = ""   # 비우면 기본(관측 어시스턴트) 프롬프트 사용

[db]
# 텔레메트리 1분 다운샘플(채널별 min/mean/max)을 SQLite에 영속. 1Hz 라이브는 인메모리.
telemetry_retention_days = 30    # 이보다 오래된 다운샘플은 prune (장기보존 원하면 ↑)

[paths]
data_dir = "data"                # asterion/ 기준 상대경로 (DB, FITS 저장)
# 시뮬레이터 데이터 격리 — sim 모드일 때 data_dir 아래 이 하위폴더로 분기(data/sim/).
# 실측 데이터와 DB·FITS가 섞이지 않게 한다. 빈 문자열이면 분리 안 함(실측과 같은 폴더).
sim_subdir = "sim"

[sim_retention]
# 시뮬레이터 저장소 보존기간 — sim 모드에서 이보다 오래된 데이터(프레임 파일+DB행: 세션·
# 기상·액션·알림·텔레메트리·품질 등)를 자동 정리한다. "한 3달"=90일. 실측 모드는 영향 없음.
enabled = true
days = 90
sweep_interval_hours = 6         # 정리 주기(기동 시 1회 + 이 간격마다)
