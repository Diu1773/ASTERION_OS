<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASTERION · 사운드 시청</title>
<style>
  :root { --bg:#16181d; --card:#1e2127; --line:#2b2f37; --tx:#e7e9ee; --tx2:#9aa0ab; --acc:#5b9dd9; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--tx);
         font-family:"IBM Plex Sans","Segoe UI",system-ui,sans-serif; padding:24px; }
  h1 { font-size:20px; font-weight:500; margin:0 0 4px; }
  p.sub { color:var(--tx2); font-size:13px; margin:0 0 20px; }
  .bar { display:flex; align-items:center; gap:12px; margin:0 0 22px; max-width:520px; }
  .bar span { font-size:13px; color:var(--tx2); white-space:nowrap; }
  input[type=range] { flex:1; accent-color:var(--acc); }
  h2 { font-size:14px; font-weight:500; color:var(--tx2); margin:22px 0 10px;
       border-bottom:1px solid var(--line); padding-bottom:6px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px; }
  button.snd { display:flex; align-items:center; gap:10px; text-align:left; cursor:pointer;
        background:var(--card); border:1px solid var(--line); border-radius:8px;
        color:var(--tx); padding:10px 12px; transition:border-color .12s, background .12s; }
  button.snd:hover { border-color:var(--acc); }
  button.snd:active { background:#262a31; }
  button.snd .play { width:26px; height:26px; flex:none; border-radius:50%; background:#2a2e36;
        display:flex; align-items:center; justify-content:center; color:var(--acc); font-size:13px; }
  button.snd .meta { display:flex; flex-direction:column; min-width:0; }
  button.snd .nm { font-size:14px; font-weight:500; }
  button.snd .src { font-size:11px; color:var(--tx2); }
  .hint { color:var(--tx2); font-size:12px; margin-top:24px; line-height:1.7; }
</style>
</head>
<body>
  <h1>사운드 시청 — 어느 게 그 "띵"인가요?</h1>
  <p class="sub">전부 실제 Windows 시스템 사운드입니다. 카드를 누르면 재생됩니다. 마음에 드는 카드 이름(예: exclamation)을 알려주세요.</p>
  <div class="bar">
    <span>음량</span>
    <input type="range" id="vol" min="0" max="100" step="1" value="85">
    <span id="volout">85%</span>
  </div>
  <div id="root"></div>
  <p class="hint">이름이 곧 파일명입니다(<code>asterion/web/sounds/&lt;이름&gt;.wav</code>). 경고·촬영·성공·연결 등 이벤트별로 다르게 고르셔도 됩니다.</p>

<script>
  var CATS = [
    ["경고음 \"띵\" 계열", [
      ["exclamation","Windows Exclamation"],
      ["ding-modern","Windows Ding"],
      ["ding-classic","ding (옛 클래식)"],
      ["critical-stop","Windows Critical Stop"],
      ["error","Windows Error"],
      ["chord","chord"],
      ["chimes","chimes"]
    ]],
    ["성공 / 완료", [
      ["tada","tada"],
      ["print-complete","Windows Print complete"]
    ]],
    ["일반 알림", [
      ["notify","Windows Notify"],
      ["notify-generic","Notify System Generic"],
      ["notify-legacy","notify (옛 클래식)"],
      ["balloon","Windows Balloon"],
      ["message-nudge","Windows Message Nudge"]
    ]],
    ["연결 / 장치", [
      ["hardware-insert","Hardware Insert"],
      ["hardware-remove","Hardware Remove"],
      ["pop","Pop-up Blocked"]
    ]],
    ["미묘한 틱 (촬영용 후보)", [
      ["background","Windows Background"],
      ["foreground","Windows Foreground"]
    ]],
    ["심각 / 배터리", [
      ["battery-critical","Battery Critical"]
    ]]
  ];

  var vol = 0.85, cur = null;
  function play(name) {
    if (cur) { try { cur.pause(); } catch(e){} }
    cur = new Audio("sounds/" + name + ".wav");
    cur.volume = vol;
    cur.play().catch(function(){});
  }
  var root = document.getElementById("root");
  CATS.forEach(function(cat){
    var h = document.createElement("h2"); h.textContent = cat[0]; root.appendChild(h);
    var g = document.createElement("div"); g.className = "grid";
    cat[1].forEach(function(s){
      var b = document.createElement("button"); b.className = "snd"; b.dataset.n = s[0];
      b.innerHTML = '<span class="play">&#9654;</span><span class="meta">' +
        '<span class="nm">' + s[0] + '</span><span class="src">' + s[1] + '</span></span>';
      g.appendChild(b);
    });
    root.appendChild(g);
  });
  root.addEventListener("click", function(e){
    var b = e.target.closest("button.snd"); if (b) play(b.dataset.n);
  });
  var vs = document.getElementById("vol"), vo = document.getElementById("volout");
  vs.addEventListener("input", function(){ vol = Number(vs.value)/100; vo.textContent = vs.value + "%"; });
</script>
</body>
</html>
