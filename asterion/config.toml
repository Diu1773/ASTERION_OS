# Asterion — 청람천문대 통합 관측 OS 설정
# 시뮬레이션이 기본값. 실제 하드웨어 연결 전에는 항상 sim으로 검증한다.

[site]
name = "청람천문대"
name_ascii = "Cheongram Observatory"   # FITS 헤더용 (ASCII만 허용)
latitude = 36.64        # TODO: 실제 좌표로 수정 (deg, 북위 +)
longitude = 127.49      # TODO: 실제 좌표로 수정 (deg, 동경 +)
elevation_m = 200
focal_length_mm = 2939  # PlaneWave (TODO: 실제 값 확인)
instrument = "ZWO ASI071MC Pro"

[server]
host = "127.0.0.1"
port = 8520

[drivers]
# mode = "sim"  → 모든 장비 시뮬레이터 (마스터 스위치)
# mode = "real" → 아래 장비별 설정을 따름 (장비별로 sim 혼용 가능: 예. mount만 pwi4, 카메라는 sim)
mode = "sim"
mount = "pwi4"          # real 모드에서: "pwi4" | "sim"
camera = "zwo"          # real 모드에서: "zwo" | "ascom" | "sim"
filterwheel = "ascom"   # real 모드에서: "ascom" | "sim"
focuser = "ascom"       # real 모드에서: "ascom" | "sim"
weather = "sim"         # 기상 장비 연결 전까지 sim

# 자동 재연결 워치독 — 끊긴 장비를 백오프로 다시 붙인다 (운영자가 끈 건 제외)
auto_reconnect = true
watchdog_interval_s = 5      # 워치독 점검 주기
reconnect_grace_s = 30       # 연결 직후 유예 — 호밍/캘리브레이션(ZWO EFW 등) 끝낼 시간. 그 안엔 재연결 안 함
reconnect_base_s = 5         # 첫 재시도 간격 (이후 2배씩 증가)
reconnect_max_s = 60         # 재시도 간격 상한
filterwheel_init_timeout_s = 20  # EFW 초기화가 이 시간을 넘으면 연결 해제
filterwheel_move_timeout_s = 20  # EFW 슬롯 이동 제한시간

[drivers.pwi4]
base_url = "http://127.0.0.1:8220"

[drivers.zwo]
# ZWO ASI071 MC Pro 네이티브 SDK 연결 (ASCOM/DCOM 불필요)
# lib_path = ""  → 자동 탐색 (ZWO SDK / SharpCap / NINA / 레지스트리 순)
# 자동 탐색이 실패할 때만 아래 주석 해제 후 경로 직접 입력:
# lib_path = "C:/Program Files/ZWO/ASI Camera SDK/x64/ASICamera2.dll"
lib_path = ""
camera_index = 0    # PC에 ZWO 카메라가 1대면 0
gain = 0            # 0 = 최저 게인 (이미징 기본값; 높일수록 노이즈 증가)

[drivers.davis]
# Davis WeatherLink Live 로컬 API (LAN). real 모드 + drivers.weather="davis"일 때 사용
base_url = "http://127.0.0.1"

[drivers.ascom]
# scripts/choose_ascom.py 실행 → ASCOM Chooser에서 선택 → 출력된 ProgID를 여기에 입력
mount_progid = ""         # ASCOM Telescope (PWI4 대신 ASCOM 가대일 때. 예: RST-135)
camera_progid = ""        # 예: "ASCOM.C3_61000.Camera" (ZWO 등)
filterwheel_progid = ""
focuser_progid = ""
weather_progid = ""       # ASCOM ObservingConditions (Davis/AAG/Boltwood 등)
dome_progid = ""          # ASCOM Dome (NexDome/MaxDome II/ScopeDome 등)

[drivers.dome]
# 시리얼 돔(청람 CW/CCW/STOP). real 모드 + drivers.dome="serial"일 때 사용.
# ⚠️ 명령 프로토콜·회전속도는 실제 컨트롤러로 검증·교정할 것(현재 기본값은 자리표시).
serial_port = ""           # 예: "COM3" (비우면 미연결)
baud = 9600
rot_speed_deg_s = 3.0      # 추측항법용 회전속도 — 한 바퀴 시간 재서 교정

[dome]
# 돔 슬레이빙 기하 (망원경 광축이 돔 구를 뚫는 방위 계산). 청람 1회 실측값.
# 오프셋은 돔 중심 대비 가대 교차점의 동/북/상 변위(m). 0이면 가대가 돔 중심.
radius_m = 2.0
mount_offset_e_m = 0.0
mount_offset_n_m = 0.0
mount_offset_up_m = 0.0
gem_dec_offset_m = 0.0     # 독일식 적도의 경통 측면 오프셋(근사)
az_tolerance_deg = 4.0     # 슬릿이 넓어 이 오차 안이면 재이동 안 함

[capture]
# 수동 캡처 콘솔 기본값
default_exposure = 2.0
default_interval = 1.0
autosave = true

[filters]
# 필터휠 슬롯 순서대로
names = ["L", "B", "V", "R", "I", "Ha"]

[autoflat]
filters = ["B", "V", "R", "I"]   # 촬영할 필터 순서 (대역 순서)
frames_per_filter = 7
adu_min = 20000                  # 16bit 기준 목표 ADU 범위
adu_max = 25000
min_alt_deg = 40                 # 이 고도 미만이면 플랫 위치로 슬루
flat_alt_deg = 75                # 플랫 촬영 목표 고도 (반태양 방위)
dither_arcsec = 30               # 프레임 간 디더 크기
settle_seconds = 4               # 슬루 종료 후 가대 안정화 대기
initial_exposure = 1.0
min_exposure = 0.1
max_exposure = 60.0
# 스카이플랫 박명 창 — 일몰/일출 전후에만 촬영. 청람천문대는 박명 하늘에서 ~2초 노출.
flat_sun_alt_high = -1.0         # 태양이 이보다 높으면 너무 밝음 (시작 전)
flat_sun_alt_low = -12.0         # 태양이 이보다 낮으면 너무 어두움 (종료)

[camera]
saturation_adu = 65535
image_width = 4944               # ZWO ASI071 MC Pro (IMX071, APS-C)
image_height = 3284

[sim]
image_width = 618                # 시뮬 프레임은 축소 생성 (속도, ASI071 1/8 스케일)
image_height = 411
exposure_sleep_cap_s = 2.0       # 시뮬에서 노출 대기 상한 (데모 속도)
twilight_efold_s = 240.0         # 황혼 시뮬: 하늘 밝기 e-folding 시간
# 시뮬 돔 흉내: feedback=false면 추측항법(드리프트+추정), shutter_auto=false면 수동 셔터(청람 현 상태)
dome_feedback = true
dome_shutter_auto = true

[safety]
# 기상 텔레메트리 fail-closed (로드맵 §6.5 / 원칙 #5: "데이터 없으면 unsafe").
# 마지막으로 유효한 기상값을 받은 뒤 경과시간이 이 값을 넘으면 워치타워가
# 기상값을 신뢰하지 않는다. 데이터를 한 번도 못 받아도 unsafe로 닫는다.
weather_warn_seconds = 30      # 이 이상 지연 → 경고 표시 (운영 계속)
weather_unsafe_seconds = 120   # 이 이상 지연(또는 데이터 없음) → WEATHER_HOLD

[sentinel]
# 프레임 품질 판정 임계 (로드맵 §10.4). 기본 지표(중앙값 ADU·과포화 비율)로
# accepted/warning/rejected를 정한다. FWHM·star count는 추후 분석 플러그인이 채움.
saturation_reject_frac = 0.02   # 과포화 픽셀 비율 이 이상 → rejected
saturation_warn_frac = 0.005    # 이 이상 → warning
median_low_adu = 1000.0         # 중앙값 이 이하 → 노출 부족 warning
median_high_frac = 0.9          # 중앙값 ≥ 이 비율×saturation_adu → 과노출 warning

[forge]
# 실시간 단일 프레임 보정(퀵룩, 로드맵 §10.2 경량). 캡처된 LIGHT에 Calibration
# Library의 마스터 bias/dark/flat을 즉시 적용해 보정된 그림을 바로 프리뷰한다.
# 순수 numpy라 가볍다. 무거운 정렬·적분 스택은 AstralImage 서브프로세스로 별도(온디맨드).
# 토글은 런타임 API(/api/forge/toggle)로도 가능 — 아래는 시작 기본값.
live_calibration = false        # true면 찍자마자 보정된 퀵룩 (마스터 있을 때만 동작)
save_calibrated = false         # true면 보정본 FITS도 frames/cal/에 저장 (프리뷰만이면 false)
pedestal_adu = 0.0              # 보정 후 더할 페데스탈(음수/클리핑 방지용, 선택)
# 마스터 자동 해석 — 자율형: OS가 자기 캡처(Frame)를 우선 쓴다. 아래 핀은 폴백:
#   외부에서 찍은 마스터 '파일' 또는 보정프레임 '폴더' 경로(폴더면 안의 FITS를 스택).
#   비워두면 OS 캡처만 사용. flat은 오토플랫 당일분이 있으면 핀보다 그걸 우선.
dark_pin = ""                   # 예: "D:/cal/master_dark.fits" 또는 "D:/cal/darks/"
flat_pin = ""                   # 한 번 만든 마스터 플랫을 계속 쓸 때 지정
bias_pin = ""
dark_exposure_tol_s = 1.0       # 캡처 dark를 LIGHT 노출에 맞출 허용 오차(초, 1초 내외)
flat_max_age_hours = 24.0       # 이 시간 내 캡처 flat만 '당일'로 자동 사용 (넘으면 핀)
stack_max_frames = 20           # 마스터 합성 시 스택할 최대 프레임 수

[satellite]
# 위성영상 프록시 — KMA 천리안2A(GK-2A) 최신 프레임을 서버가 받아 캐시하고
# /api/satellite/latest.png 고정 URL로 서빙한다. 대시보드 위성영상 패널은 이 로컬
# URL을 '이미지' 유형으로 붙이면 된다(핫링크/CORS/타임스탬프 문제를 서버가 흡수).
enabled = true
base_url = "https://nmsc.kma.go.kr"
# 경로 템플릿(UTC): {YYYYMM}{DD}{HH} 경로 + {YYYYMMDDhhmm} 파일명.
# 기본 = IR 10.5µm 한반도(KO) — 적외라 주야 24h 구름이 보임, 2분 주기.
path_template = "/IMG/GK2A/AMI/PRIMARY/L1B/COMPLETE/KO/{YYYYMM}/{DD}/{HH}/gk2a_ami_le1b_ir105_ko020lc_{YYYYMMDDhhmm}.png"
# 대안(주석 해제해 교체) — 모두 실측 확인됨, 2분 주기:
#  · 트루컬러 한반도(주간 전용, 컬러):
#    path_template = "/IMG/GK2A/AMI/PRIMARY/L1B/COMPLETE/KO/{YYYYMM}/{DD}/{HH}/gk2a_ami_le1b_rgb-s-true_ko020lc_{YYYYMMDDhhmm}.png"
media_type = "image/png"
grid_seconds = 120         # 후보 시각 격자 = 제품 주기(KO 2분). 약수여야 함.
latency_seconds = 180      # 최신(미발행 가능) 프레임 건너뛰는 여유
lookback_steps = 30        # 역탐색 최대 스텝 (grid×steps = 1시간 과거까지)
refresh_seconds = 120      # 서버 캐시 갱신 주기('받는 주기') — 원본 주기에 맞춤
timeout_seconds = 12.0     # 프레임 1장 요청 타임아웃
min_bytes = 4096           # 이보다 작으면 이미지로 안 봄(HTML 에러페이지 거름)

[agent]
# 대시보드 임베디드 AI 채팅. LLM은 벤더중립(OpenAI 호환) — base_url/model/api_key만 바꾸면
# 어디든 붙는다. 비워두면 채팅창은 뜨되 "모델 미설정" 안내를 돌려준다(코어 영향 0).
#  OpenAI : base_url="https://api.openai.com/v1"        model="gpt-4o-mini"   api_key="sk-..."
#  Groq   : base_url="https://api.groq.com/openai/v1"   model="llama-3.3-70b-versatile"
#  Ollama : base_url="http://127.0.0.1:11434/v1"        model="llama3.1"      (로컬·무료·키 불필요)
base_url = ""
model = ""
api_key = ""
# system_prompt = ""   # 비우면 기본(관측 어시스턴트) 프롬프트 사용

[db]
# 텔레메트리 1분 다운샘플(채널별 min/mean/max)을 SQLite에 영속. 1Hz 라이브는 인메모리.
telemetry_retention_days = 30    # 이보다 오래된 다운샘플은 prune (장기보존 원하면 ↑)

[paths]
data_dir = "data"                # asterion/ 기준 상대경로 (DB, FITS 저장)
